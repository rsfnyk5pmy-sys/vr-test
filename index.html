<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>判断力低下体験VR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

</head>

<a-scene background="color: #111">
  <a-assets>
  <a-asset-item id="stageModel" src="stage.glb"></a-asset-item>
  <a-asset-item id="coneModel"  src="cone.glb"></a-asset-item>
  </a-assets>

  <a-entity
    gltf-model="#stageModel"
    position="0 0 0"
    rotation="0 90 0"
    scale="1 1 1">
  </a-entity>
  <!-- カメラ -->
  <a-entity id="player" position="0 1.6 57">
   <a-camera wasd-controls-enabled="false">
  <a-cursor
    color="red"
    raycaster="objects: .clickable">
  </a-cursor>
</a-camera>

    <a-entity
      laser-controls="hand: left">
    </a-entity>

  <!-- 右手 -->
    <a-entity
      laser-controls="hand: right">
    </a-entity>
  </a-entity>

  <!-- 背景 -->
  

  

  <!-- タイトル -->
  <a-entity
   id="title"
   troika-text="
     value: 判断力低下体験VR;
     color: #ff4444;
     align: center;
     fontSize: 0.8;
   "
   position="0 7 -4">
  </a-entity>

  <!-- サブタイトル -->
  

  <!-- 説明 -->
  <a-entity
   id="description"
   troika-text="
     value: 「説明!」\n前からくる障害物などを\n避けて進もう;
     color: #ff4444;
     align: center;
     fontSize: 0.6;
   "
   position="0 6 55">
  </a-entity>

  <!-- STARTボタン -->
   <a-box
  id="startButton"
  position="0 3 55"
  depth="0.3"
  height="0.7"
  width="2.5"
  color="#00aa66"
  class="clickable"
  event-set__enter="_event: mouseenter; color: #44ff44">
  </a-box>

  <!-- START文字 -->
  <a-text
    id="start"
    value="START"
    position="0 3 55.3"
    align="center"
    color="white"
    width="5">
  </a-text>

  <!--goal-->
  <a-box
    id="goal"
    position="0 1 -50"
    width="5"
    height="3"
    depth="1"
    color="gold">
  </a-box>

  <!--障害物-->
  <a-entity id="coneContainer"></a-entity>

  <!-- 装飾ライト -->
  <a-light type="ambient" intensity="0.8"></a-light>

  <a-light
    type="point"
    position="0 5 0"
    intensity="1">
  </a-light>

</a-scene>

<script>
  let gameStarted=false;

  let controllerX = 0;

  let moveLeft = false;
  let moveRight = false;

  let sideSpeed = 0;
  let maxSideSpeed = 0.12;
  let accel = 0.015;
  let friction = 0.9;
  let reverseControl = false;

  window.addEventListener("gamepadconnected", (e) => {
    console.log("コントローラー接続");
  });
  


  // STARTボタンを押した時
function startGame(){
  
  if(gameStarted) return;

  gameStarted = true;

  createCones();

  document.querySelector("#title").setAttribute("visible", false);
  document.querySelector("#description").setAttribute("visible", false);
  document.querySelector("#startButton").setAttribute("visible", false);
  document.querySelector("#start").setAttribute("visible", false);
}


const startButton = document.querySelector("#startButton");

// PCでクリック
startButton.addEventListener("click", startGame);

// Questでトリガー
startButton.addEventListener("mousedown", startGame);

// Enterキーでも開始
document.addEventListener("triggerdown", () => {

  const cursor = document.querySelector("a-cursor");

  const intersection =
    cursor.components.raycaster
      ?.getIntersection(startButton);

  if(intersection){
    startGame();
  }

});





  //前進処理
  AFRAME.registerComponent('move-player',{

  tick: function(){
    if(gameStarted){
      const player = document.querySelector('#player');

      // 自動前進
      // 自動前進
player.object3D.position.z -= 0.1;

const gamepads = navigator.getGamepads();

for (let gp of gamepads) {

  if (!gp) continue;

  let axisX = 0;

  if (gp.axes.length > 0 &&
      Math.abs(gp.axes[0]) > 0.2) {

    axisX = gp.axes[0];

  }

  if (gp.axes.length > 2 &&
      Math.abs(gp.axes[2]) > 0.2) {

    axisX = gp.axes[2];

  }

  if (Math.abs(axisX) > 0.2) {

    sideSpeed += axisX * 0.02;

  }

}
      // 左右の加速
      if(!reverseControl){

        // 通常操作
        if(moveLeft){
          sideSpeed -= accel;
        }

        if(moveRight){
          sideSpeed += accel;
        }

      }else{

        // 逆操作
        if(moveLeft){
          sideSpeed += accel;
        }

        if(moveRight){
          sideSpeed -= accel;
        }

      }

      // 酔いによるふらつき
      let drunkWobble = Math.sin(Date.now() * 0.003) * 0.03;

      // 酔いによるランダムなズレ
      let randomDrift = (Math.random() - 0.3) * 0.03;

      // 最大速度を制限
      sideSpeed = Math.max(-maxSideSpeed, Math.min(maxSideSpeed, sideSpeed));

      // キーを離したら減速
      if(!moveLeft && !moveRight){
        sideSpeed *= friction;
      }

      // 横移動
      player.object3D.position.x += sideSpeed + drunkWobble + randomDrift;

      // 道から出ないようにする
      player.object3D.position.x =
        Math.max(-4, Math.min(4, player.object3D.position.x));
    }
  }
});
  //操作反転
  setInterval(() => {

    // 50%の確率で操作反転
    reverseControl = Math.random() < 0.5;

  }, 2000);

  document.addEventListener("keydown",(e) =>{
  if(e.key === "ArrowLeft" || e.key === "a"){
    moveLeft = true;
  }

  if(e.key === "ArrowRight" || e.key === "d"){
    moveRight = true;
  }
});

document.addEventListener("keyup",(e) =>{
  if(e.key === "ArrowLeft" || e.key === "a"){
    moveLeft = false;
  }

  if(e.key === "ArrowRight" || e.key === "d"){
    moveRight = false;
  }
});





  document
    .querySelector('a-scene')
    .setAttribute('move-player','');

  //ゴールの判定
  AFRAME.registerComponent('goal-check',{

    tick: function(){
      if (!gameStarted) return;

      const player = document.querySelector('#player');
      const goal= document.querySelector('#goal');
      
      const playerPos=player.object3D.position;
      const goalPos=goal.object3D.position;

      const distance=playerPos.distanceTo(goalPos);

      if(distance < 3){

        gameStarted=false;

        location.href="clear.html";
      }
    }

  });

  document
    .querySelector('a-scene')
    .setAttribute('goal-check','');

  //ゲームオーバー
  AFRAME.registerComponent('collision-check', {

  tick: function(){

    if (!gameStarted) return;

    const player = document.querySelector('#player');
    const obstacles = document.querySelectorAll('.obstacle');

    const playerPos = player.object3D.position;

    obstacles.forEach((obstacle) => {

      const obstaclePos = obstacle.object3D.position;

      const distance = playerPos.distanceTo(obstaclePos);

      if(distance < 2.5){

        gameStarted = false;

        location.href = "gameover.html";

      }

    });

  }

  

});

function createCones(){

  const container =
    document.querySelector("#coneContainer");

  for(let i = 0; i < 15; i++){

    const cone =
      document.createElement("a-entity");

    cone.setAttribute("class", "obstacle");

    cone.setAttribute(
      "gltf-model",
      "#coneModel"
    );

    // 左右ランダム
    const x =
      Math.random() * 6 - 3;

    // 奥に並べる
    const z =
      30 - (i * 5);

    cone.setAttribute(
      "position",
      `${x} 0 ${z}`
    );

    cone.setAttribute(
      "scale",
      "1 1 1"
    );

    container.appendChild(cone);
  }

}

document
  .querySelector('a-scene')
  .setAttribute('collision-check', '');
</script>

</body>
</html>
